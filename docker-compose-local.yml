name: tramites
services:
  php:
    container_name: php
    build: images/php
    volumes:
      - ./images/php/php-custom.ini:/usr/local/etc/php/conf.d/php-custom.ini
      - ./images/php/laravel:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "chown -R 1000:1000 /var/www/html &&
      chown -R www-data:www-data /var/www/html/storage/framework && 
      chown -R www-data:www-data /var/www/html/storage/logs && 
      chown -R www-data:www-data /var/www/html/storage/app/public && 
      php artisan lang:update && 
      php artisan migrate --force && 
      php-fpm"

  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./images/php/laravel/:/var/www/html
      - ./images/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
      
  db:
    container_name: mysql
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: tramites_db
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-psecret" ]
      interval: 5s
      retries: 5
      start_period: 10s

  phpmyadmin:
    container_name: phpmyadmin
    image: phpmyadmin/phpmyadmin
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: secret
    depends_on:
      - db

  queue:
    container_name: queue
    build: images/php
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./images/php/laravel:/var/www/html
    working_dir: /var/www/html
    command: >
      sh -c "php artisan queue:work --verbose --tries=3 --timeout=600"
    restart: always

  loki:
    image: grafana/loki:2.9.2
    container_name: loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-storage:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=robert
      - GF_SECURITY_ADMIN_PASSWORD=adminr
    depends_on:
      - loki
    restart: unless-stopped

  promtail:
    image: grafana/promtail:2.9.2
    container_name: promtail
    volumes:
      - ./images/php/laravel/storage/logs:/var/log/laravel:ro
      - ./images/promtail/promtail-config.yml:/etc/promtail/promtail.yml
    command: -config.file=/etc/promtail/promtail.yml
    depends_on:
      - loki
    restart: unless-stopped


volumes:
  mysql-data:
  grafana-storage:
