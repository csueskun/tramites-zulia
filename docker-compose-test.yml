name: tramites
services:
  php:
    container_name: php
    build:
      context: ./images/php
      dockerfile: DockerfileTest
    volumes:
      - ./images/php/php-custom.ini:/usr/local/etc/php/conf.d/php-custom.ini
      - ./images/php/laravel:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "chown -R 1000:1000 /var/www/html &&
      chown -R www-data:www-data /var/www/html/storage/framework && 
      chown -R www-data:www-data /var/www/html/storage/logs && 
      chown -R www-data:www-data /var/www/html/storage/app/public && 
      php artisan lang:update && 
      php artisan migrate --force && 
      php-fpm"

  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./images/php/laravel/:/var/www/html
      - ./images/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

  db:
    container_name: mysql
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: tramites_db
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
    command: --default-time-zone='-05:00'
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-psecret" ]
      interval: 5s
      retries: 5
      start_period: 10s

  queue:
    container_name: queue
    build: images/php
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./images/php/laravel:/var/www/html
    working_dir: /var/www/html
    command: >
      sh -c "php artisan queue:work --verbose --tries=3 --timeout=600"
    restart: always

volumes:
  mysql-data: